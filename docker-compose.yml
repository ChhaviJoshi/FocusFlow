version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: focusflow-db
    environment:
      POSTGRES_DB: focusflow
      POSTGRES_USER: focusflow
      POSTGRES_PASSWORD: focusflow_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-run schema on first start
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: focusflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
